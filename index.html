<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdón</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.contenedor{
    text-align:center;
}

button{
    padding:10px 25px;
    font-size:16px;
    margin:10px;
    border:none;
    border-radius:6px;
    color:white;
}

#si{
    background:#28a745;
    cursor:pointer;
}

#si:hover{
    background:#218838;
}

#no{
    background:#dc3545;
    position:absolute;
    cursor:default;
}
</style>
</head>
<body>

<div class="contenedor">
    <h2>Giselle, ¿Me perdonas?</h2>

    <button id="si">Sí</button>
    <button id="no">No</button>
</div>

<script>
const no = document.getElementById("no");

function mover(){
    no.style.left = Math.random() * (window.innerWidth - 100) + "px";
    no.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

mover();

no.addEventListener("mouseenter", mover);

document.addEventListener("mousemove", (e)=>{
    const r = no.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);

    if(Math.sqrt(dx*dx + dy*dy) < 100){
        mover();
    }
});

document.getElementById("si").onclick = () => {
    document.body.innerHTML = "<h1 style='font-family:Arial;text-align:center;margin-top:40vh;'>¡Gracias mami, eres lo máximo!</h1>";
};
</script>

</body>
</html>
